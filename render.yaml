services:
  - type: web
    name: withexpenese
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: MONTHLY_BUDGET
        value: "20000"
      - key: DATABASE_URL
        sync: false
