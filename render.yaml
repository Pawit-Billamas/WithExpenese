services:
  - type: web
    name: withexpenese
    env: python
    plan: free
    buildCommand: apt-get update -y && apt-get install -y tesseract-ocr && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: MONTHLY_BUDGET
        value: "20000"
      - key: DATABASE_URL
        sync: false
